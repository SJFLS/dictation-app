<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>自定义单词听写 HTML</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(160deg, #06172c, #123454);
    color: #fff;
    min-height: 100vh;
    padding: 18px;
  }
  .wrap { max-width: 920px; margin: 0 auto; }
  h1 { font-size: 28px; margin: 8px 0 8px; letter-spacing: .5px; }
  .sub { color: #c8d7e8; line-height: 1.6; margin-bottom: 14px; }
  .tip {
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 16px;
    padding: 12px;
    color: #d7e6f7;
    font-size: 14px;
    line-height: 1.55;
    margin-bottom: 14px;
  }
  .panel {
    background: rgba(255,255,255,.1);
    border: 1px solid rgba(255,255,255,.14);
    border-radius: 22px;
    padding: 16px;
    margin-bottom: 14px;
    backdrop-filter: blur(8px);
  }
  .label { color: #9fb6d2; font-size: 13px; margin-bottom: 8px; }
  #currentEn { font-size: 34px; font-weight: 700; line-height: 1.2; word-break: break-word; }
  #currentZh { font-size: 22px; color: #b9e8ff; margin-top: 8px; }
  body.hide-cards #currentEn,
  body.hide-cards #currentZh { visibility: hidden; }
  body.hide-cards .dictation-mask { display: block; }
  .dictation-mask {
    display: none;
    margin-top: 10px;
    color: #b9e8ff;
    font-size: 18px;
    line-height: 1.6;
  }
  #status { color: #b9e8ff; font-size: 14px; margin-top: 10px; min-height: 20px; line-height:1.55; }
  select, input, textarea {
    width: 100%;
    border: 0;
    outline: 0;
    border-radius: 16px;
    padding: 13px 14px;
    font-size: 16px;
    margin: 7px 0 12px;
    font-family: inherit;
  }
  textarea {
    min-height: 170px;
    resize: vertical;
    line-height: 1.55;
  }
  input[type="range"] { padding: 0; accent-color: #dff6ff; }
  .controls { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 10px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
  body.hide-cards #search,
  body.hide-cards #grid,
  body.hide-cards #inputPanel { display: none; }
  button.item {
    border: 0; border-radius: 18px; background: #fff; color: #07172d;
    padding: 14px; min-height: 82px; text-align: left;
    box-shadow: 0 8px 18px rgba(0,0,0,.16);
    transition: transform .12s ease, box-shadow .12s ease, background .15s ease, outline-color .15s ease;
    outline: 3px solid transparent;
    cursor: pointer;
  }
  button.item:active { transform: scale(.96); box-shadow: 0 4px 10px rgba(0,0,0,.2); }
  button.item.selected {
    background: #dff6ff;
    outline: 3px solid #4ec6ff;
    box-shadow: 0 10px 24px rgba(78,198,255,.35);
  }
  .en { font-size: 19px; font-weight: 700; line-height: 1.25; }
  .zh { font-size: 14px; color: #526070; margin-top: 5px; }
  /* 隐藏中文释义模式 */
  body.hide-zh .zh,
  body.hide-zh #currentZh { visibility: hidden; }
  .zh.loading { color: #8a99ad; font-style: italic; }
  .tool {
    border: 0; border-radius: 16px; padding: 12px;
    background: rgba(255,255,255,.16); color: white; font-size: 15px;
    transition: transform .1s ease, background .15s ease, box-shadow .12s ease, color .15s ease;
    cursor: pointer;
  }
  .tool:active { transform: scale(.96); background: rgba(255,255,255,.28); }
  .primary { background: #dff6ff; color: #07172d; font-weight: 700; }
  .primary:active { background: #b8ecff; }
  .danger { background: rgba(255,255,255,.08); color: #fff; }

  .nav-row {
    display: none;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 12px;
  }
  body.hide-cards .nav-row { display: grid; }
  .nav-btn {
    border: 0;
    border-radius: 22px;
    padding: 18px 16px;
    background: #dff6ff;
    color: #07172d;
    font-size: 22px;
    font-weight: 800;
    box-shadow: 0 10px 22px rgba(0,0,0,.18);
    transition: transform .1s ease, background .15s ease, box-shadow .12s ease;
    cursor: pointer;
  }
  .nav-btn:active {
    transform: scale(.96);
    background: #9fe2ff;
    box-shadow: 0 4px 10px rgba(0,0,0,.22);
  }
  .nav-btn.secondary {
    background: rgba(255,255,255,.16);
    color: #fff;
  }
  .nav-btn.secondary:active {
    background: rgba(255,255,255,.32);
  }

  .progress {
    display: none;
    text-align: center;
    color: #d7e6f7;
    margin: 6px 0 12px;
    font-size: 15px;
  }
  body.hide-cards .progress { display: block; }
  @media (min-width: 720px) {
    .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .controls { grid-template-columns: 1fr 1fr; align-items: end; }
    h1 { font-size: 40px; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="label">Dictation HTML</div>
    <h1>自定义单词 / 句子听写</h1>
    <div class="sub">粘贴一整段内容也可以，只会提取“带序号”的单词或句子，自动去掉标题、空行、结尾说明等无关内容。</div>

    <div class="tip">
      支持自动提取：<br>
      1. spring<br>
      2、summer<br>
      3）What's the weather like?<br>
      4. spring 春天<br>
      不带序号的“单词&短语部分 / 句子部分 / 需要我顺便……”会自动忽略。
    </div>

    <div id="inputPanel" class="panel">
      <div class="label">粘贴整段内容</div>
      <textarea id="wordInput" placeholder="把带序号的大段内容粘贴到这里。输入框默认是空的。"></textarea>
      <div class="row">
        <button class="tool primary" onclick="generateCards()">提取序号并生成卡片</button>
        <button class="tool danger" onclick="clearInput()">清空输入</button>
      </div>
    </div>

    <div class="panel">
      <div class="controls">
        <div>
          <div class="label">英文声音</div>
          <select id="enVoice">
            <option value="en-US-JennyNeural">Jenny 美式女声</option>
            <option value="en-US-AriaNeural">Aria 美式女声</option>
            <option value="en-US-AnaNeural">Ana 美式儿童女声</option>
            <option value="en-US-GuyNeural">Guy 美式男声</option>
            <option value="en-GB-SoniaNeural" selected>Sonia 英式女声</option>
            <option value="en-GB-RyanNeural">Ryan 英式男声</option>
          </select>
        </div>
        <div>
          <div class="label">中文声音</div>
          <select id="zhVoice">
            <option value="zh-CN-XiaoxiaoNeural" selected>晓晓 女声</option>
            <option value="zh-CN-XiaoyiNeural">晓伊 女声</option>
            <option value="zh-CN-YunxiNeural">云希 男声</option>
            <option value="zh-CN-YunyangNeural">云扬 男声</option>
          </select>
        </div>
      </div>

      <div class="controls">
        <div>
          <div class="label">英文速度：<span id="speedText">1</span></div>
          <input id="speed" type="range" min="0.5" max="1.2" step="0.05" value="1" oninput="speedText.textContent=this.value">
        </div>
        <div>
          <div class="label">模式</div>
          <select id="mode">
            <option value="twice-cn" selected>英文两遍 → 中文</option>
            <option value="once-cn">英文一遍 → 中文</option>
            <option value="en-only">只读英文</option>
          </select>
        </div>
      </div>

      <div class="controls">
        <div>
          <div class="label">每段之间停顿：<span id="gapText">0.3</span> 秒</div>
          <input id="gap" type="range" min="0" max="3" step="0.1" value="0.3" oninput="gapText.textContent=this.value">
        </div>
      </div>

      <div class="row">
        <button class="tool primary" onclick="testApi()">测试接口</button>
        <button class="tool" onclick="downloadCurrent()">下载当前音频</button>
      </div>
    </div>

    <div class="panel">
      <div class="row">
        <button id="toggleCardsBtn" class="tool primary" onclick="toggleCards()">隐藏单词卡片</button>
        <button class="tool" onclick="resetSequence()">顺序重置</button>
      </div>
      <div class="row" style="margin-top:8px;">
        <button id="toggleZhBtn" class="tool" onclick="toggleZh()">隐藏中文释义</button>
        <button class="tool" onclick="retranslateAll()">重新翻译全部</button>
      </div>
    </div>

    <div id="currentPanel" class="panel">
      <div class="label">当前听写</div>
      <div id="currentEn">先粘贴内容并生成卡片</div>
      <div id="currentZh"></div>
      <div class="dictation-mask">听写模式中：文字已隐藏，请根据语音默写。</div>
      <div id="status"></div>
      <div id="progress" class="progress">准备开始</div>
      <div class="row" style="margin-top:12px;">
        <button class="tool primary" onclick="repeatCurrent()">再读一遍</button>
        <button class="tool" onclick="stopSpeak()">停止</button>
      </div>
      <div class="nav-row">
        <button id="prevBtn" class="nav-btn secondary" onclick="prevWord()">上一个</button>
        <button id="nextBtn" class="nav-btn" onclick="nextWord()">下一个</button>
      </div>
    </div>

    <input id="search" placeholder="搜索单词 / 句子..." oninput="render()" />
    <div class="grid" id="grid"></div>
  </div>

<script>
const API = "https://tts.wangwangit.com/v1/audio/speech";
const STORAGE_KEY_RAW = "dictation_raw_input_v1";
const STORAGE_KEY_ITEMS = "dictation_items_v1";
const STORAGE_KEY_SETTINGS = "dictation_settings_v1";
const STORAGE_KEY_TRANS_CACHE = "dictation_trans_cache_v1";

// 需要持久化的设置控件 id 列表
const SETTING_IDS = ["enVoice", "zhVoice", "speed", "mode", "gap", "search"];

// 翻译缓存：{en_lowercase: zh}
let transCache = {};
let isHiddenZh = false;

const zhDict = {
  "spring": "春天",
  "summer": "夏天",
  "autumn": "秋天",
  "winter": "冬天",
  "warm": "温暖的",
  "hot": "热的",
  "cool": "凉爽的",
  "cold": "寒冷的；冷的",
  "sunny": "晴朗的",
  "cloudy": "多云的",
  "windy": "有风的",
  "snowy": "下雪的",
  "season": "季节",
  "weather": "天气",
  "snowball": "雪球",
  "umbrella": "雨伞",
  "dry": "干燥的",
  "wet": "湿的",
  "carefully": "小心地；仔细地",
  "fly kites": "放风筝",
  "swim in the water": "在水里游泳",
  "throw snowballs": "扔雪球",
  "what's the weather like?": "天气怎么样？",
  "hows the weather?": "天气怎么样？",
  "how's the weather?": "天气怎么样？",
  "it's sunny.": "天气晴朗。",
  "what's your favourite season?": "你最喜欢的季节是什么？",
  "what's your favorite season?": "你最喜欢的季节是什么？",
  "i like winter best.": "我最喜欢冬天。",
  "on a rainy day, we run and jump.": "在下雨天，我们跑步和跳跃。",
  "i've got my hat and dress": "我有我的帽子和连衣裙。",
  "i've got my hat and dress.": "我有我的帽子和连衣裙。"
};

function lookupZh(en) {
  const key = normalizeText(en).toLowerCase().replace(/\s+/g, " ");
  return zhDict[key] || transCache[key] || "";
}

function loadTransCache() {
  try {
    const json = localStorage.getItem(STORAGE_KEY_TRANS_CACHE);
    if (json) transCache = JSON.parse(json) || {};
  } catch (e) {
    transCache = {};
  }
}

function saveTransCache() {
  try {
    localStorage.setItem(STORAGE_KEY_TRANS_CACHE, JSON.stringify(transCache));
  } catch (e) {}
}

// 翻译英文 -> 中文（多免费接口兜底，不使用 Google）
async function translateOne(en) {
  const text = (en || "").trim();
  if (!text) return "";
  const key = normalizeText(text).toLowerCase().replace(/\s+/g, " ");
  if (zhDict[key]) return zhDict[key];
  if (transCache[key]) return transCache[key];

  // 主接口：MyMemory（完全免费、无需 key、支持 CORS）
  try {
    const url = "https://api.mymemory.translated.net/get?q=" + encodeURIComponent(text) + "&langpair=en|zh-CN";
    const res = await fetch(url);
    if (res.ok) {
      const data = await res.json();
      let zh = (data && data.responseData && data.responseData.translatedText || "").trim();
      // MyMemory 偶尔会返回 "PLEASE SELECT TWO DISTINCT LANGUAGES" 之类的提示，过滤掉
      if (zh && zh.toLowerCase() !== text.toLowerCase() && !/^[A-Z\s]+$/.test(zh)) {
        // 解码 HTML 实体
        zh = zh.replace(/&#39;/g, "'").replace(/&quot;/g, '"').replace(/&amp;/g, "&");
        transCache[key] = zh;
        saveTransCache();
        return zh;
      }
    }
  } catch (e) {
    console.warn("MyMemory 翻译失败：", text, e);
  }

  // 备用1：LibreTranslate 公开实例
  const libreHosts = [
    "https://translate.fedilab.app",
    "https://libretranslate.de",
    "https://lt.vern.cc"
  ];
  for (const host of libreHosts) {
    try {
      const res = await fetch(host + "/translate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ q: text, source: "en", target: "zh", format: "text" })
      });
      if (res.ok) {
        const d = await res.json();
        const zh = (d && d.translatedText || "").trim();
        if (zh && zh.toLowerCase() !== text.toLowerCase()) {
          transCache[key] = zh;
          saveTransCache();
          return zh;
        }
      }
    } catch (e) {
      // 继续尝试下一个
    }
  }

  // 备用2：FreeDictionary 单词词典（只对单个英文单词有效）
  if (/^[A-Za-z\-']+$/.test(text)) {
    try {
      const res = await fetch("https://api.dictionaryapi.dev/api/v2/entries/en/" + encodeURIComponent(text.toLowerCase()));
      if (res.ok) {
        const arr = await res.json();
        // 词典返回的是英文释义，没有中文，跳过；这里仅作为占位
      }
    } catch (e) {}
  }

  return "";
}

// 批量翻译没有中文释义的卡片
async function translateMissing(force) {
  if (!items.length) return;
  const todo = [];
  items.forEach(([en, zh], idx) => {
    if (force || !zh) todo.push(idx);
  });
  if (!todo.length) return;

  setStatus(`正在自动翻译 ${todo.length} 个英文项...`);
  let done = 0;
  // 并发 4 个一组
  const concurrency = 4;
  for (let i = 0; i < todo.length; i += concurrency) {
    const batch = todo.slice(i, i + concurrency);
    await Promise.all(batch.map(async (idx) => {
      const [en] = items[idx];
      const zh = await translateOne(en);
      if (zh) items[idx][1] = zh;
      done++;
      setStatus(`翻译中：${done} / ${todo.length}`);
      render();
      if (idx === currentIndex) {
        document.getElementById("currentZh").textContent = items[idx][1] || "暂无中文释义";
      }
    }));
  }
  saveState();
  setStatus(`翻译完成，共 ${done} 个项目已补充中文。`);
  setTimeout(() => setStatus(""), 1500);
}

async function retranslateAll() {
  if (!items.length) {
    setStatus("还没有卡片，先生成卡片再翻译。");
    return;
  }
  await translateMissing(true);
}

let items = [];
let current = null;
let currentIndex = -1;
let currentAudio = null;
let lastBlobUrl = null;
let lastBlob = null;
let isHiddenMode = false;

function setStatus(text) {
  document.getElementById("status").textContent = text || "";
}

function stopSpeak() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
    currentAudio = null;
  }
  setStatus("");
}

function cleanupBlobUrl() {
  if (lastBlobUrl) URL.revokeObjectURL(lastBlobUrl);
  lastBlobUrl = null;
  lastBlob = null;
}

function clearInput() {
  document.getElementById("wordInput").value = "";
  try { localStorage.removeItem(STORAGE_KEY_RAW); } catch (e) {}
  setStatus("输入框已清空。");
}

function saveState() {
  try {
    const raw = document.getElementById("wordInput").value;
    localStorage.setItem(STORAGE_KEY_RAW, raw);
    localStorage.setItem(STORAGE_KEY_ITEMS, JSON.stringify(items));
  } catch (e) {
    console.warn("保存失败", e);
  }
}

function saveSettings() {
  try {
    const settings = {};
    SETTING_IDS.forEach(id => {
      const el = document.getElementById(id);
      if (el) settings[id] = el.value;
    });
    settings.isHiddenMode = isHiddenMode;
    settings.isHiddenZh = isHiddenZh;
    settings.currentIndex = currentIndex;
    localStorage.setItem(STORAGE_KEY_SETTINGS, JSON.stringify(settings));
  } catch (e) {
    console.warn("保存设置失败", e);
  }
}

function loadSettings() {
  try {
    const json = localStorage.getItem(STORAGE_KEY_SETTINGS);
    if (!json) return;
    const settings = JSON.parse(json);
    SETTING_IDS.forEach(id => {
      if (settings[id] !== undefined) {
        const el = document.getElementById(id);
        if (el) el.value = settings[id];
      }
    });
    // 同步显示值
    const sp = document.getElementById("speedText");
    if (sp) sp.textContent = document.getElementById("speed").value;
    const gp = document.getElementById("gapText");
    if (gp) gp.textContent = document.getElementById("gap").value;

    if (typeof settings.currentIndex === "number") currentIndex = settings.currentIndex;
    if (settings.isHiddenMode) {
      isHiddenMode = true;
      document.body.classList.add("hide-cards");
      const btn = document.getElementById("toggleCardsBtn");
      if (btn) btn.textContent = "显示单词卡片";
    }
    if (settings.isHiddenZh) {
      isHiddenZh = true;
      document.body.classList.add("hide-zh");
      const zbtn = document.getElementById("toggleZhBtn");
      if (zbtn) zbtn.textContent = "显示中文释义";
    }
  } catch (e) {
    console.warn("读取设置失败", e);
  }
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY_RAW);
    const itemsJson = localStorage.getItem(STORAGE_KEY_ITEMS);
    if (raw) document.getElementById("wordInput").value = raw;
    if (itemsJson) {
      const parsed = JSON.parse(itemsJson);
      if (Array.isArray(parsed) && parsed.length) {
        items = parsed;
        document.getElementById("currentEn").textContent = `上次已生成 ${items.length} 个卡片`;
        document.getElementById("currentZh").textContent = "点任意卡片或“下一个”开始";
      }
    }
  } catch (e) {
    console.warn("读取失败", e);
  }
}

function bindSettingsAutosave() {
  SETTING_IDS.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    const evt = (el.tagName === "SELECT") ? "change" : "input";
    el.addEventListener(evt, saveSettings);
    el.addEventListener("change", saveSettings);
  });
}

function normalizeText(text) {
  return text
    .replace(/\u00a0/g, " ")
    .replace(/[“”]/g, '"')
    .replace(/[‘’]/g, "'")
    .replace(/[，]/g, ",")
    .replace(/[？]/g, "?")
    .replace(/[！]/g, "!")
    .replace(/[。]/g, ".")
    .replace(/\s+/g, " ")
    .trim();
}

function removeSerialPrefix(text) {
  return text
    .replace(/^[\s　]*(?:\d+|[①②③④⑤⑥⑦⑧⑨⑩])[\.\、\)）:：-]*[\s　]*/g, "")
    .trim();
}

function parseLine(line) {
  const raw = line.trim();
  if (!raw) return null;

  // 只接受带序号的行：1. / 1、 / 1） / ①
  if (!/^[\s　]*(?:\d+|[①②③④⑤⑥⑦⑧⑨⑩])[\.\、\)）:：-]+[\s　]*/.test(raw)) return null;

  let text = normalizeText(removeSerialPrefix(raw));
  if (!text) return null;

  // 去掉常见的行尾杂符号
  text = text.replace(/^[\-—–•\s]+|[\s]+$/g, "");

  let en = text;
  let zh = "";

  // 支持：spring 春天 / What's the weather like? 天气怎么样？
  const match = text.match(/^([A-Za-z][A-Za-z\s,'?.!]+?)\s+([\u4e00-\u9fa5].*)$/);
  if (match) {
    en = match[1].trim();
    zh = match[2].trim();
  }

  // 自动过滤明显不是英语词句的内容
  if (!/[A-Za-z]/.test(en)) return null;

  if (!zh) zh = lookupZh(en);
  return [en, zh];
}

function extractNumberedItems(raw) {
  const lines = raw.split(/\n+/);
  const result = [];

  for (const line of lines) {
    const parsed = parseLine(line);
    if (parsed) result.push(parsed);
  }

  return result;
}

async function generateCards() {
  const raw = document.getElementById("wordInput").value;
  const parsed = extractNumberedItems(raw);

  if (!parsed.length) {
    setStatus("没有识别到带序号的单词或句子。请确认每行类似：1. spring");
    return;
  }

  items = parsed.map(([en, zh]) => [en, zh || lookupZh(en)]);
  current = null;
  currentIndex = -1;
  document.getElementById("currentEn").textContent = `已生成 ${items.length} 个卡片`;
  document.getElementById("currentZh").textContent = "";
  document.getElementById("search").value = "";
  render();
  updateProgress();
  saveState();
  setStatus(`已生成 ${items.length} 个卡片，准备自动翻译没有中文的项...`);
  // 异步自动翻译没有中文释义的项
  await translateMissing(false);
}

async function createAudioBlob(text, voice, speed) {
  const response = await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      input: text,
      voice: voice,
      speed: Number(speed),
      pitch: "0",
      style: "general",
      volume: "0"
    })
  });

  if (!response.ok) {
    const errText = await response.text().catch(() => "");
    throw new Error("接口返回错误：" + response.status + " " + errText.slice(0, 80));
  }

  const blob = await response.blob();
  if (!blob || blob.size < 100) throw new Error("生成的音频为空");
  return blob;
}

function playBlob(blob) {
  return new Promise((resolve, reject) => {
    stopSpeak();
    cleanupBlobUrl();

    lastBlob = blob;
    lastBlobUrl = URL.createObjectURL(blob);
    const audio = new Audio(lastBlobUrl);
    currentAudio = audio;

    audio.onended = resolve;
    audio.onerror = () => reject(new Error("音频播放失败"));
    audio.play().catch(reject);
  });
}

async function speakOne(text, voice, speed, label) {
  if (!text) return;
  setStatus("正在生成：" + label);
  const blob = await createAudioBlob(text, voice, speed);
  setStatus("正在播放：" + label);
  await playBlob(blob);
}

async function speak(en, zh) {
  current = [en, zh];
  document.getElementById("currentEn").textContent = en;
  if (!zh) zh = lookupZh(en);
  current = [en, zh];
  document.getElementById("currentZh").textContent = zh || "暂无中文释义";
  updateSelectedCard();

  const enVoice = document.getElementById("enVoice").value;
  const zhVoice = document.getElementById("zhVoice").value;
  const speed = Number(document.getElementById("speed").value || 1);
  const mode = document.getElementById("mode").value;
  const gapMs = Math.round(Number(document.getElementById("gap").value || 0.3) * 1000);

  try {
    await speakOne(en, enVoice, speed, "英文");
    if (mode === "twice-cn") {
      await new Promise(r => setTimeout(r, gapMs));
      await speakOne(en, enVoice, Math.max(0.5, speed - 0.18), "英文慢速");
    }
    if (mode !== "en-only" && zh) {
      await new Promise(r => setTimeout(r, gapMs));
      await speakOne(zh, zhVoice, 1.0, "中文");
    }
    setStatus("完成");
    setTimeout(() => setStatus(""), 900);
  } catch (err) {
    console.error(err);
    setStatus("没播放成功：" + err.message + "。可以换个声音，或检查网络。");
  }
}

function testApi() {
  speak("It's sunny.", "天气晴朗。");
}

function repeatCurrent() {
  if (current) speak(current[0], current[1]);
  else setStatus("还没有当前单词，先生成卡片再点一个卡片或点“下一个”。");
}

function nextWord() {
  if (!items.length) {
    setStatus("还没有卡片，请先粘贴内容并生成卡片。");
    return;
  }
  currentIndex = (currentIndex + 1) % items.length;
  updateProgress();
  saveSettings();
  const [en, zh] = items[currentIndex];
  speak(en, zh);
}

function prevWord() {
  if (!items.length) {
    setStatus("还没有卡片，请先粘贴内容并生成卡片。");
    return;
  }
  currentIndex = (currentIndex - 1 + items.length) % items.length;
  updateProgress();
  saveSettings();
  const [en, zh] = items[currentIndex];
  speak(en, zh);
}

function resetSequence() {
  currentIndex = -1;
  current = null;
  document.getElementById("currentEn").textContent = "已重置，点“下一个”开始";
  document.getElementById("currentZh").textContent = "";
  updateProgress();
  updateSelectedCard();
  saveSettings();
  setStatus("顺序已重置。");
}

function updateProgress() {
  const progress = document.getElementById("progress");
  if (!items.length) {
    progress.textContent = "暂无卡片";
  } else if (currentIndex < 0) {
    progress.textContent = `准备开始：共 ${items.length} 个`;
  } else {
    progress.textContent = `第 ${currentIndex + 1} / ${items.length} 个`;
  }
}

function toggleCards() {
  isHiddenMode = !isHiddenMode;
  document.body.classList.toggle("hide-cards", isHiddenMode);
  document.getElementById("toggleCardsBtn").textContent = isHiddenMode ? "显示单词卡片" : "隐藏单词卡片";
  saveSettings();

  if (isHiddenMode) {
    updateProgress();
    setStatus("听写模式已开启。点击“上一个/下一个”切换。");
  } else {
    setStatus("卡片已显示，可以粘贴新内容或点任意卡片练习。");
  }
}

function toggleZh() {
  isHiddenZh = !isHiddenZh;
  document.body.classList.toggle("hide-zh", isHiddenZh);
  document.getElementById("toggleZhBtn").textContent = isHiddenZh ? "显示中文释义" : "隐藏中文释义";
  saveSettings();
  setStatus(isHiddenZh ? "中文释义已隐藏。" : "中文释义已显示。");
}

async function downloadCurrent() {
  if (!current) {
    setStatus("先点一个单词或句子，再下载。");
    return;
  }
  try {
    const enVoice = document.getElementById("enVoice").value;
    const speed = Number(document.getElementById("speed").value || 1);
    const blob = await createAudioBlob(current[0], enVoice, speed);
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = current[0].replace(/[^a-z0-9]+/gi, "_").replace(/^_|_$/g, "") + ".mp3";
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    setStatus("已开始下载当前英文音频。");
  } catch (err) {
    setStatus("下载失败：" + err.message);
  }
}

function updateSelectedCard() {
  const grid = document.getElementById("grid");
  if (!grid) return;
  const btns = grid.querySelectorAll("button.item");
  btns.forEach(btn => {
    const idx = Number(btn.dataset.idx);
    if (idx === currentIndex) btn.classList.add("selected");
    else btn.classList.remove("selected");
  });
}

function render() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  if (!items.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;color:#c8d7e8;text-align:center;padding:22px;">还没有卡片，先粘贴内容并生成。</div>';
    return;
  }

  items.forEach(([en, zh], idx) => {
    if (q && !en.toLowerCase().includes(q) && !(zh || "").includes(q)) return;
    const btn = document.createElement("button");
    btn.className = "item";
    btn.dataset.idx = idx;
    if (idx === currentIndex) btn.classList.add("selected");
    btn.onclick = () => {
      currentIndex = idx;
      updateProgress();
      updateSelectedCard();
      saveSettings();
      speak(en, zh);
    };
    btn.innerHTML = `<div class="en">${en}</div><div class="zh">${zh || "点击听写"}</div>`;
    grid.appendChild(btn);
  });
}

// 输入框内容实时保存
document.addEventListener("DOMContentLoaded", () => {
  const input = document.getElementById("wordInput");
  if (input) {
    input.addEventListener("input", () => {
      try { localStorage.setItem(STORAGE_KEY_RAW, input.value); } catch (e) {}
    });
  }
});

loadTransCache();
loadState();
loadSettings();
bindSettingsAutosave();
render();
updateSelectedCard();
updateProgress();
</script>
